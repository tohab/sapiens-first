<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting — Sapiens First</title>
  <script>
    var isLocal = window.location.protocol === 'file:'
      || window.location.hostname === 'localhost'
      || window.location.hostname === '127.0.0.1';
    window.location.replace(isLocal ? 'join.html' : '/join');
  </script>
</head>
<body>
  <p>Redirecting… <a href="/join">Click here if you are not redirected.</a></p>
</body>
</html>
