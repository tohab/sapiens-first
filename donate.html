  <footer class="footer">
    <div class="container">
      <div class="footer-inner">
        <div class="footer-logo">Sapiens First</div>
        <div style="display:flex;align-items:center;gap:20px;"><a class="footer-link" href="/privacy">Privacy Policy</a><span class="footer-meta">© 2026 SAPIENS FIRST</span></div>
      </div>
    </div>
  </footer>

  <script>
    const burger = document.querySelector('.nav-burger');
    const navLinks = document.querySelector('.nav-links');
    if (burger && navLinks) {
      burger.addEventListener('click', () => {
        const open = burger.classList.toggle('open');
        navLinks.classList.toggle('open', open);
        burger.setAttribute('aria-expanded', open);
        document.body.style.overflowY = open ? 'hidden' : '';
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && burger.classList.contains('open')) {
          burger.classList.remove('open'); navLinks.classList.remove('open');
          document.body.style.overflowY = '';
        }
      });
      window.addEventListener('resize', () => {
        if (window.innerWidth > 768 && burger.classList.contains('open')) {
          burger.classList.remove('open'); navLinks.classList.remove('open');
          document.body.style.overflowY = '';
        }
      });
    }

    const DONATE_URL = 'https://sapiensfirst.org/donate';
    const SHARE_TEXT = 'AI could reshape civilization — and we need to fight back. Support Sapiens First: ';

    document.getElementById('share-x').href =
      'https://x.com/intent/tweet?text=' + encodeURIComponent(SHARE_TEXT) + '&url=' + encodeURIComponent(DONATE_URL);
    document.getElementById('share-fb').href =
      'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(DONATE_URL);
    document.getElementById('share-wa').href =
      'https://wa.me/?text=' + encodeURIComponent(SHARE_TEXT + ' ' + DONATE_URL);

    document.getElementById('copy-link').addEventListener('click', function () {
      navigator.clipboard.writeText(DONATE_URL).then(() => {
        const btn = this;
        btn.classList.add('copied');
        setTimeout(() => btn.classList.remove('copied'), 2000);
      });
    });

    (function () {
      const field = document.querySelector('.ember-field');
      if (!field) return;
      const colors = ['#f97316','#fb923c','#fbbf24','#ef4444','#f59e0b','#fdba74'];
      for (let i = 0; i < 174; i++) {
        const el = document.createElement('div');
        el.className = 'ember';
        const size = 1.5 + Math.random() * 2;
        const col = colors[Math.floor(Math.random() * colors.length)];
        const dur = (2.2 + Math.random() * 3.52).toFixed(2);
        const del = (-Math.random() * 7).toFixed(2);
        const peak = (0.35 + Math.random() * 0.55).toFixed(2);
        const glow = (size * 1.8).toFixed(1);
        const x = Math.random() * 100;
        const u = Math.random();
        const y = (-0.8 + Math.sqrt(0.64 + 0.8 * u)) / 0.4 * 100;
        el.style.cssText = `left:${x}%;top:${y}%;width:${size}px;height:${size}px;background:${col};--ec:${col};--ed:${dur}s;--ey:${del}s;--ep:${peak};--eg:${glow}px`;
        field.appendChild(el);
      }
    })();
  </script>
