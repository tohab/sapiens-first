<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Events — Sapiens First</title>
  <meta name="description" content="Find Sapiens First events near you and show up for the revolution.">
  <meta property="og:title" content="Events — Sapiens First">
  <meta property="og:description" content="Find events near you and show up for the revolution.">
  <meta property="og:url" content="https://sapiensfirst.org/events">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>

    /* ─── EVENTS SECTION ─────────────────────── */
    .events-section { padding: 72px 0 96px; }

    .events-header {
      display: flex; align-items: baseline; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-bottom: 28px;
    }
    .events-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(40px, 6vw, 64px); line-height: 1;
      letter-spacing: -0.02em; text-transform: uppercase;
    }
    .host-link {
      font-family: var(--font-mono); font-size: var(--sz-label);
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid var(--accent); padding-bottom: 1px;
      white-space: nowrap; transition: opacity .2s;
    }
    .host-link:hover { opacity: 0.72; }

    /* ─── CITY FILTER ───────────────────────── */
    .city-filter { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .city-btn {
      font-family: var(--font-mono); font-size: var(--sz-label);
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 8px 18px; border: 1px solid var(--border);
      background: transparent; color: var(--text-dim);
      cursor: pointer; transition: background .15s, color .15s, border-color .15s;
    }
    .city-btn:hover { border-color: var(--text-dim); color: var(--text); }
    .city-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ─── EVENT LIST ────────────────────────── */
    .events-list { display: flex; flex-direction: column; border: 1px solid var(--border); }
    .empty-state {
      padding: 52px 0;
      font-family: var(--font-body); font-size: var(--sz-body);
      color: var(--text-dim); line-height: 1.6;
    }
    .loading-state {
      padding: 40px 0;
      font-family: var(--font-mono); font-size: var(--sz-label);
      color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase;
    }

    /* ─── EVENT CARD ────────────────────────── */
    .event-card {
      display: flex; align-items: stretch;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background .15s; min-height: 96px;
    }
    .event-card:last-child { border-bottom: none; }
    .event-card:hover { background: rgba(20,18,14,0.04); }
    .event-card.past { opacity: 0.5; }

    .card-date-col {
      width: 88px; flex-shrink: 0;
      background: var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 16px 8px; gap: 2px;
    }
    .event-card.past .card-date-col { background: var(--text-dim); }
    .event-card:hover .card-date-col { filter: brightness(1.08); }
    .card-month {
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(255,255,255,0.75);
    }
    .card-day {
      font-family: var(--font-display); font-weight: 800;
      font-size: 42px; line-height: 1; color: #fff; letter-spacing: -0.02em;
    }
    .card-year {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em; color: rgba(255,255,255,0.55);
    }
    .card-nodate-col {
      width: 88px; flex-shrink: 0; background: var(--border);
      display: flex; align-items: center; justify-content: center;
    }
    .card-nodate-inner {
      font-family: var(--font-mono); font-size: 10px;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(20,18,14,0.35);
      writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    }
    .card-body {
      flex: 1; padding: 18px 24px 16px;
      display: flex; flex-direction: column; justify-content: center; gap: 5px;
    }
    .card-title {
      font-family: var(--font-display); font-weight: 700;
      font-size: 22px; line-height: 1.1;
      letter-spacing: 0.01em; text-transform: uppercase; color: var(--text);
    }
    .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-meta-item { font-family: var(--font-body); font-size: var(--sz-label); color: var(--text-dim); }
    .card-meta-dot { color: var(--border); }
    .card-arrow {
      flex-shrink: 0; display: flex; align-items: center;
      padding: 0 20px 0 8px;
      font-family: var(--font-mono); font-size: 16px;
      color: var(--border); transition: color .15s, transform .15s;
    }
    .event-card:hover .card-arrow { color: var(--accent); transform: translateX(3px); }

    /* ─── PAST LABEL ────────────────────────── */
    .past-label {
      font-family: var(--font-mono); font-size: var(--sz-label);
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim); margin: 48px 0 16px;
    }

    /* ─── EVENT MODAL ───────────────────────── */
    .event-modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.3);
      z-index: 200; opacity: 0; visibility: hidden;
      transition: opacity 0.25s ease, visibility 0.25s ease; cursor: pointer;
    }
    .event-modal.open { opacity: 1; visibility: visible; }
    .event-modal-inner {
      position: absolute; top: 0; right: 0; bottom: 0;
      width: min(520px, 100%); background: var(--bg); cursor: default;
      padding: 48px 40px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 20px;
      transform: translateX(100%);
      transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .event-modal.open .event-modal-inner { transform: translateX(0); }
    .modal-date-row { display: flex; align-items: center; gap: 10px; }
    .modal-date { font-family: var(--font-body); font-size: var(--sz-label); font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); }
    .modal-time { font-family: var(--font-body); font-size: var(--sz-label); color: var(--text-dim); }
    .modal-dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; flex-shrink: 0; }
    .modal-title {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(28px, 5vw, 40px); line-height: 1.05;
      letter-spacing: -0.01em; text-transform: uppercase; color: var(--text);
    }
    .modal-desc { font-family: var(--font-body); font-size: 16px; color: var(--text-dim); line-height: 1.7; border-top: 1px solid var(--border); padding-top: 20px; }
    .modal-details { display: flex; flex-direction: column; gap: 14px; border-top: 1px solid var(--border); padding-top: 20px; }
    .detail-row { display: flex; flex-direction: column; gap: 4px; }
    .detail-label { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); }
    .detail-value { font-family: var(--font-body); font-size: 15px; color: var(--text); line-height: 1.5; }
    .detail-value a { color: var(--accent); text-decoration: none; }
    .detail-value a:hover { text-decoration: underline; }
    .modal-close-hint { font-family: var(--font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); opacity: 0.45; text-align: center; padding-top: 8px; margin-top: auto; }
    .modal-share-row { display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); padding-top: 20px; }
    .modal-share-url { font-family: var(--font-body); font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
    .modal-copy-btn {
      flex-shrink: 0; padding: 8px 14px; border: 1px solid var(--border);
      background: transparent; color: var(--text); cursor: pointer;
      font-family: var(--font-body); font-size: 12px; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase;
      transition: background .15s, border-color .15s;
    }
    .modal-copy-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
    .modal-copy-btn.copied { background: #2a7a3b; border-color: #2a7a3b; color: #fff; }

    /* ─── RESPONSIVE ────────────────────────── */
    @media (max-width: 768px) {
      .events-header { flex-direction: column; gap: 10px; }
      .card-day { font-size: 34px; }
      .card-date-col, .card-nodate-col { width: 68px; }
    }
    @media (max-width: 600px) {
      .container { padding: 0 20px; }
      .card-body { padding: 14px 16px 12px; }
      .card-title { font-size: 18px; }
      .card-arrow { padding: 0 12px 0 4px; }
    }

  </style>
</head>
<body>

  <nav class="site-nav"></nav>

  <div class="page-hero">
    <div class="ember-field" aria-hidden="true"></div>
    <div class="container">
      <h1 class="page-title">Upcoming<br><span class="title-accent">Events</span></h1>
    </div>
  </div>

  <main>
    <section class="events-section">
      <div class="container">
        <div class="events-header">
          <h2 class="events-title">All Events</h2>
          <a class="host-link" href="/organize">Want to host? →</a>
        </div>
        <div id="city-filter-wrap"></div>
        <div id="events-container">
          <div class="loading-state">Loading events…</div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"></footer>

  <div id="event-modal" class="event-modal" role="dialog" aria-modal="true">
    <div class="event-modal-inner" id="event-modal-inner"></div>
  </div>

  <script>
    const SHEET_ID  = '1mkPKC7MmmKhW8PS2K-7lqmjreQOln6zz9t5C-lSDqOU';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    const REFRESH_MS = 60 * 1000;
    const COL = { TITLE:1, DESC:2, BRING:3, ADDRESS:4, CITY:5, ORG_NAME:6, ORG_PHONE:7, DATE:8, TIME:9 };
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function parseGvizDate(cell) {
      if (!cell || cell.v === null) return null;
      const m = String(cell.v).match(/Date\((\d+),(\d+),(\d+)/);
      if (m) return new Date(+m[1], +m[2], +m[3]);
      const d = new Date(cell.v); return isNaN(d) ? null : d;
    }
    function getCellValue(row, col) {
      const c = row.c[col];
      if (!c || c.v === null || c.v === undefined) return '';
      return c.f != null ? c.f : String(c.v);
    }
    function parseEvents(rows) {
      return rows.map(row => {
        const dc = row.c[COL.DATE];
        let dateObj = parseGvizDate(dc);
        if (!dateObj && dc && dc.f) { dateObj = new Date(dc.f); if (isNaN(dateObj)) dateObj = null; }
        return { title: getCellValue(row,COL.TITLE), desc: getCellValue(row,COL.DESC), bring: getCellValue(row,COL.BRING), address: getCellValue(row,COL.ADDRESS), city: getCellValue(row,COL.CITY), orgName: getCellValue(row,COL.ORG_NAME), orgPhone: getCellValue(row,COL.ORG_PHONE), dateObj, time: getCellValue(row,COL.TIME) };
      }).filter(e => e.title);
    }
    function isPast(e) {
      if (!e.dateObj) return false;
      const t = new Date(); t.setHours(0,0,0,0); return e.dateObj < t;
    }

    function buildCard(event) {
      const card = document.createElement('article');
      card.className = 'event-card' + (isPast(event) ? ' past' : '');
      let dateColHTML;
      if (event.dateObj) {
        const d = event.dateObj;
        dateColHTML = `<div class="card-date-col"><span class="card-month">${MONTHS[d.getMonth()]}</span><span class="card-day">${d.getDate()}</span><span class="card-year">${d.getFullYear()}</span></div>`;
      } else {
        dateColHTML = `<div class="card-nodate-col"><span class="card-nodate-inner">TBD</span></div>`;
      }
      const metaParts = [event.city, event.time].filter(Boolean);
      const metaHTML = metaParts.map((p,i) => `<span class="card-meta-item">${p}</span>${i<metaParts.length-1?'<span class="card-meta-dot">·</span>':''}`).join('');
      card.innerHTML = `${dateColHTML}<div class="card-body"><div class="card-title">${event.title}</div>${metaHTML?`<div class="card-meta">${metaHTML}</div>`:''}</div><div class="card-arrow">→</div>`;
      card.addEventListener('click', () => openModal(event));
      return card;
    }

    function eventSlug(event) { return encodeURIComponent(event.title); }

    function openModal(event) {
      const inner = document.getElementById('event-modal-inner');
      const mapQuery = [event.address, event.city].filter(Boolean).join(', ');
      const mapsHref = mapQuery ? `https://maps.google.com/?q=${encodeURIComponent(mapQuery)}` : null;
      const hasDetails = event.address || event.bring || event.orgName;
      const dateStr = event.dateObj ? event.dateObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}) : '';
      const shareUrl = location.origin + location.pathname + '?event=' + eventSlug(event);
      inner.innerHTML = `
        <div class="modal-date-row">
          ${dateStr?`<span class="modal-date">${dateStr}</span>`:''}
          ${dateStr&&event.time?`<span class="modal-dot"></span>`:''}
          ${event.time?`<span class="modal-time">${event.time}</span>`:''}
        </div>
        <div class="modal-title">${event.title}</div>
        ${event.desc?`<p class="modal-desc">${event.desc}</p>`:''}
        ${hasDetails?`<div class="modal-details">
          ${event.address?`<div class="detail-row"><span class="detail-label">Location</span><span class="detail-value">${mapsHref?`<a href="${mapsHref}" target="_blank" rel="noopener">${event.address}${event.city?', '+event.city:''}</a>`:event.address+(event.city?', '+event.city:'')}</span></div>`:''}
          ${event.bring?`<div class="detail-row"><span class="detail-label">What to bring</span><span class="detail-value">${event.bring}</span></div>`:''}
          ${event.orgName?`<div class="detail-row"><span class="detail-label">Organizer</span><span class="detail-value">${event.orgName}${event.orgPhone?' · '+event.orgPhone:''}</span></div>`:''}
        </div>`:''}
        <div class="modal-share-row">
          <span class="modal-share-url">${shareUrl}</span>
          <button class="modal-copy-btn" id="modal-copy-btn">Copy link</button>
        </div>
        <p class="modal-close-hint">Click outside to close</p>`;
      document.getElementById('modal-copy-btn').addEventListener('click', function() {
        navigator.clipboard.writeText(shareUrl).then(() => {
          this.textContent = 'Copied!';
          this.classList.add('copied');
          setTimeout(() => { this.textContent = 'Copy link'; this.classList.remove('copied'); }, 2000);
        });
      });
      history.replaceState(null, '', '?event=' + eventSlug(event));
      document.getElementById('event-modal').classList.add('open');
      document.body.style.overflowY = 'hidden';
    }
    function closeModal() {
      document.getElementById('event-modal').classList.remove('open');
      document.body.style.overflowY = '';
      history.replaceState(null, '', location.pathname);
    }
    document.getElementById('event-modal').addEventListener('click', function(e) {
      if (!document.getElementById('event-modal-inner').contains(e.target)) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

    let allEvents = [], activeCity = 'all';
    function setCity(city) { activeCity = city; renderEvents(); }

    function renderEvents() {
      const filtered = activeCity==='all' ? allEvents : allEvents.filter(e=>e.city===activeCity);
      const upcoming = filtered.filter(e=>!isPast(e)).sort((a,b)=>(a.dateObj||0)-(b.dateObj||0));
      const past     = filtered.filter(e=> isPast(e)).sort((a,b)=>(b.dateObj||0)-(a.dateObj||0));
      const container = document.getElementById('events-container');
      container.innerHTML = '';

      if (allEvents.length === 0) {
        container.innerHTML = `<p class="empty-state">Join our email list to hear about events when they come up.</p>`;
        return;
      }
      if (upcoming.length === 0 && past.length === 0) {
        container.innerHTML = `<p class="empty-state">No events in ${activeCity}.</p>`;
        return;
      }
      if (upcoming.length > 0) {
        const list = document.createElement('div'); list.className = 'events-list';
        upcoming.forEach(e => list.appendChild(buildCard(e)));
        container.appendChild(list);
      }
      if (past.length > 0) {
        const lbl = document.createElement('p'); lbl.className = 'past-label'; lbl.textContent = 'Past Events';
        container.appendChild(lbl);
        const list = document.createElement('div'); list.className = 'events-list';
        past.forEach(e => list.appendChild(buildCard(e)));
        container.appendChild(list);
      }

      const filterWrap = document.getElementById('city-filter-wrap');
      filterWrap.innerHTML = '';
      const cities = [...new Set(allEvents.map(e=>e.city).filter(Boolean))].sort();
      if (cities.length >= 2) {
        const bar = document.createElement('div'); bar.className = 'city-filter';
        [['all','All cities'],...cities.map(c=>[c,c])].forEach(([val,label]) => {
          const btn = document.createElement('button');
          btn.className = 'city-btn' + (activeCity===val?' active':'');
          btn.textContent = label;
          btn.addEventListener('click', () => setCity(val));
          bar.appendChild(btn);
        });
        filterWrap.appendChild(bar);
      }
    }

    async function loadEvents() {
      try {
        const res  = await fetch(SHEET_URL);
        const text = await res.text();
        const json = JSON.parse(text.replace(/^[^(]+\(/,'').replace(/\);?\s*$/,''));
        allEvents  = parseEvents((json.table&&json.table.rows)||[]);
        renderEvents();
        tryAutoOpen();
      } catch(err) {
        console.error(err);
        document.getElementById('events-container').innerHTML = `<p class="empty-state">Join our email list to hear about events when they come up.</p>`;
      }
    }

    let autoOpened = false;
    function tryAutoOpen() {
      if (autoOpened) return;
      const param = new URLSearchParams(location.search).get('event');
      if (!param) return;
      const match = allEvents.find(e => eventSlug(e) === encodeURIComponent(param));
      if (match) { autoOpened = true; openModal(match); }
    }

    loadEvents();
    setInterval(loadEvents, REFRESH_MS);

    (function(){
      const field=document.querySelector('.ember-field'); if(!field)return;
      const colors=['#f97316','#fb923c','#fbbf24','#ef4444','#f59e0b','#fdba74'];
      for(let i=0;i<174;i++){
        const el=document.createElement('div'); el.className='ember';
        const size=1.5+Math.random()*2, col=colors[Math.floor(Math.random()*colors.length)];
        const dur=(2.2+Math.random()*3.52).toFixed(2), del=(-Math.random()*7).toFixed(2);
        const peak=(0.35+Math.random()*0.55).toFixed(2), glow=(size*1.8).toFixed(1);
        const x=Math.random()*100, u=Math.random(), y=(-0.8+Math.sqrt(0.64+0.8*u))/0.4*100;
        el.style.cssText=`left:${x}%;top:${y}%;width:${size}px;height:${size}px;background:${col};--ec:${col};--ed:${dur}s;--ey:${del}s;--ep:${peak};--eg:${glow}px`;
        field.appendChild(el);
      }
    })();
  </script>
  <script src="nav.js"></script>
  <script src="footer.js"></script>
  <script src="nav-circle.js"></script>
</body>
</html>
