<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post — Sapiens First</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png">
  <link rel="shortcut icon" href="favicons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="palette.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1020px;
      margin: 0 auto;
      padding: 0 64px;
    }

    /* ─── POST HEADER ───────────────────── */
    .post-header {
      padding: 72px 0 56px;
      border-bottom: 1px solid var(--border);
      max-width: 760px;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-dim);
      text-decoration: none;
      margin-bottom: 40px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }
    .post-meta {
      font-family: var(--font-mono);
      font-size: 10.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
    }
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: clamp(40px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 24px;
    }
    .post-excerpt {
      font-size: 18px;
      line-height: 1.72;
      color: var(--text-dim);
      max-width: 560px;
    }

    /* ─── POST BODY ─────────────────────── */
    .post-body {
      padding: 64px 0 120px;
      max-width: 680px;
    }
    .post-body h1,
    .post-body h2,
    .post-body h3,
    .post-body h4 {
      font-family: var(--font-display);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-top: 52px;
      margin-bottom: 18px;
    }
    .post-body h1 { font-size: clamp(28px, 3.5vw, 40px); line-height: 1.0; }
    .post-body h2 { font-size: clamp(24px, 3vw, 34px); line-height: 1.05; }
    .post-body h3 { font-size: clamp(20px, 2.5vw, 28px); line-height: 1.1; }
    .post-body p {
      font-size: 18px;
      line-height: 1.78;
      color: var(--text);
      margin-bottom: 24px;
    }
    .post-body ul,
    .post-body ol {
      margin: 0 0 24px 24px;
      font-size: 18px;
      line-height: 1.78;
      color: var(--text);
    }
    .post-body li { margin-bottom: 8px; }
    .post-body strong { font-weight: 638; }
    .post-body em { font-style: italic; }
    .post-body code {
      font-family: var(--font-mono);
      font-size: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 6px;
    }
    .post-body pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 20px 24px;
      overflow-x: auto;
      margin-bottom: 24px;
    }
    .post-body pre code {
      background: none;
      border: none;
      padding: 0;
      font-size: 14px;
      line-height: 1.6;
    }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 0 0 24px 0;
      padding: 4px 0 4px 20px;
      color: var(--text-dim);
      font-style: italic;
    }
    .post-body a {
      color: var(--blue);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .post-body a:hover { color: var(--accent); }
    .post-body hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 48px 0;
    }

    /* ─── ERROR / LOADING ───────────────── */
    .state-msg {
      padding: 80px 0;
      font-family: var(--font-mono);
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
    }

    @media (max-width: 640px) {
      .container { padding: 0 24px; }
      .post-header { padding: 48px 0 40px; }
      .post-body { padding: 40px 0 80px; }
    }
  </style>
</head>
<body>

  <nav id="site-nav"></nav>

  <div class="container">

    <!-- ═══════════════════════════════════ -->
    <!-- POST HEADER                         -->
    <!-- ═══════════════════════════════════ -->
    <div id="post-header" class="post-header">
      <a class="back-link" href="blog.html">&larr; Blog</a>
      <p class="state-msg">Loading…</p>
    </div>

    <!-- ═══════════════════════════════════ -->
    <!-- POST BODY                           -->
    <!-- ═══════════════════════════════════ -->
    <div id="post-body" class="post-body"></div>

  </div>

  <script src="nav.js"></script>
  <script src="posts.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('slug');
      const headerEl = document.getElementById('post-header');
      const bodyEl = document.getElementById('post-body');

      function formatDate(iso) {
        const d = new Date(iso + 'T12:00:00');
        return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
      }

      function stripFrontmatter(text) {
        const match = text.match(/^---\n([\s\S]*?)\n---\n?([\s\S]*)$/);
        if (!match) return { meta: {}, body: text };
        const meta = {};
        match[1].split('\n').forEach(function (line) {
          const i = line.indexOf(':');
          if (i === -1) return;
          const key = line.slice(0, i).trim();
          const val = line.slice(i + 1).trim();
          meta[key] = val;
        });
        return { meta: meta, body: match[2] };
      }

      if (!slug) {
        headerEl.innerHTML =
          '<a class="back-link" href="blog.html">&larr; Blog</a>' +
          '<p class="state-msg">No post specified.</p>';
        return;
      }

      const postMeta = (typeof POSTS !== 'undefined')
        ? POSTS.find(function (p) { return p.slug === slug; })
        : null;

      fetch('posts/' + slug + '.md')
        .then(function (res) {
          if (!res.ok) throw new Error('not found');
          return res.text();
        })
        .then(function (raw) {
          const parsed = stripFrontmatter(raw);
          const meta = parsed.meta;
          const title = meta.title || (postMeta && postMeta.title) || slug;
          const date  = meta.date  || (postMeta && postMeta.date)  || '';
          const excerpt = meta.excerpt || (postMeta && postMeta.excerpt) || '';

          document.title = title + ' — Sapiens First';

          headerEl.innerHTML =
            '<a class="back-link" href="blog.html">&larr; Blog</a>' +
            (date ? '<div class="post-meta">' + formatDate(date) + '</div>' : '') +
            '<h1 class="post-title">' + title + '</h1>' +
            (excerpt ? '<p class="post-excerpt">' + excerpt + '</p>' : '');

          bodyEl.innerHTML = marked.parse(parsed.body);
        })
        .catch(function () {
          headerEl.innerHTML =
            '<a class="back-link" href="blog.html">&larr; Blog</a>' +
            '<p class="state-msg">Post not found.</p>';
        });
    })();
  </script>

</body>
</html>
