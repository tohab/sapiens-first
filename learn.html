<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Guide &mdash; Sapiens First</title>
  <meta name="description" content="The Sapiens First guide to AI, people power, and how to make change.">
  <meta property="og:url" content="https://sapiensfirst.org/learn">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800;900&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Special+Elite&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <script src="config.js"></script>
  <style>

    /* GUIDE LAYOUT */
    .guide-section { padding: 72px 0 120px; }

    .guide-layout {
      display: flex;
      gap: 56px;
      align-items: start;
    }
    .guide-sidebar {
      width: 232px;
      flex-shrink: 0;
      position: sticky;
      top: 96px;
      max-height: calc(100vh - 116px);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .guide-main { flex: 1; min-width: 0; }

    @media (max-width: 900px) {
      .guide-layout { flex-direction: column; gap: 36px; }
      .guide-sidebar { width: 100%; position: static; max-height: none; overflow-y: visible; }
    }

    .loading-state {
      padding: 40px 0;
      font-family: var(--font-mono); font-size: var(--sz-label);
      color: var(--text-dim); letter-spacing: 0.12em; text-transform: uppercase;
    }
    .error-state {
      padding: 40px 0;
      font-family: var(--font-body); font-size: var(--sz-body);
      color: var(--text-dim); line-height: 1.6;
    }
    .error-state a { color: var(--accent); }

    /* DOCUMENT TYPOGRAPHY */
    .doc-body { line-height: 1.75; }

    .doc-body h1 {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(32px, 5vw, 52px); line-height: 1.05;
      letter-spacing: -0.02em; text-transform: uppercase;
      color: var(--text); margin: 0 0 24px;
    }
    .doc-body h2 {
      font-family: var(--font-display); font-weight: 800;
      font-size: clamp(26px, 4vw, 38px); line-height: 1.1;
      letter-spacing: -0.01em; text-transform: uppercase;
      color: var(--text); margin: 56px 0 16px;
      padding-bottom: 10px; border-bottom: 2px solid var(--accent);
    }
    .doc-body h3 {
      font-family: var(--font-display); font-weight: 700;
      font-size: clamp(20px, 3vw, 26px); line-height: 1.15;
      letter-spacing: 0.02em; text-transform: uppercase;
      color: var(--text); margin: 40px 0 12px;
    }
    .doc-body h4 {
      font-family: var(--font-body); font-weight: 600;
      font-size: 17px; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text); margin: 28px 0 8px;
    }

    .doc-body p {
      font-family: var(--font-body); font-size: var(--sz-body);
      color: var(--text); margin: 0 0 18px; line-height: 1.75;
    }
    .doc-body p:empty { display: none; }

    .doc-body ul, .doc-body ol {
      font-family: var(--font-body); font-size: var(--sz-body);
      color: var(--text); line-height: 1.75;
      padding-left: 28px; margin: 0 0 20px;
    }
    .doc-body ul { list-style: disc; }
    .doc-body ol { list-style: decimal; }
    .doc-body li { margin-bottom: 8px; }
    .doc-body li:last-child { margin-bottom: 0; }
    .doc-body ul ul, .doc-body ol ol,
    .doc-body ul ol, .doc-body ol ul { margin: 8px 0 0; padding-left: 24px; }

    .doc-body a {
      color: var(--accent); text-decoration: none;
      border-bottom: 1px solid rgba(205,85,29,0.35);
      transition: border-color .2s;
    }
    .doc-body a:hover { border-color: var(--accent); }
    .doc-body strong { font-weight: 700; }
    .doc-body em { font-style: italic; }

    /* TABLE */
    .doc-body table { width: 100%; border-collapse: collapse; margin: 0 0 24px; overflow-x: auto; display: block; }
    .doc-body td, .doc-body th {
      border: 1px solid var(--border);
      padding: 10px 14px; vertical-align: top;
      font-family: var(--font-body); font-size: 16px; line-height: 1.6;
    }
    .doc-body tr:first-child td { background: var(--surface); font-weight: 600; }

    /* TABLE OF CONTENTS — sidebar */
    .toc-label {
      display: block;
      font-family: var(--font-mono); font-size: 11px;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--text-dim); padding-bottom: 10px;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }

    /* H1 group headers in the TOC */
    .toc-group-header {
      margin: 14px 0 2px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .toc-group-header:first-of-type { margin-top: 6px; padding-top: 0; border-top: none; }
    .toc-group-header a {
      font-family: var(--font-display); font-weight: 700;
      font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-dim); text-decoration: none; border-bottom: none;
      display: block; padding: 2px 8px; transition: color .15s;
    }
    .toc-group-header a:hover { color: var(--accent); border-bottom: none; }

    /* h2 rows */
    .toc-h2-row { display: flex; align-items: center; }
    .toc-h2-link {
      flex: 1; padding: 5px 2px 5px 21px;
      font-family: var(--font-body); font-size: 15px; font-weight: 500;
      color: var(--text); text-decoration: none; border-bottom: none;
      transition: color .15s; line-height: 1.3;
    }
    /* chevron is 18px wide + 3px gap = 21px, matching the no-chevron indent */
    .toc-chevron + .toc-h2-link { padding-left: 3px; }
    .toc-h2-link:hover, .toc-h2-link.toc-active { color: var(--accent); border-bottom: none; }
    .toc-h2-link.toc-active { font-weight: 600; }

    .toc-chevron {
      flex-shrink: 0; width: 18px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      color: var(--text-dim); font-size: 11px;
      transition: transform .2s ease, color .15s;
    }
    .toc-chevron.open { transform: rotate(90deg); }
    .toc-chevron:hover { color: var(--accent); }

    /* h3 sub-list */
    .toc-h3-list { list-style: none; padding: 0 0 4px 36px; margin: 0; display: none; }
    .toc-h3-list.open { display: block; }
    .toc-h3-list a {
      display: block; padding: 3px 2px;
      font-family: var(--font-body); font-size: 13px;
      color: var(--text-dim); text-decoration: none; border-bottom: none;
      transition: color .15s;
    }
    .toc-h3-list a:hover, .toc-h3-list a.toc-active { color: var(--accent); border-bottom: none; }
    .toc-h3-list a.toc-active { font-weight: 500; }

    @media (max-width: 900px) {
      .toc { border: 1px solid var(--border); padding: 16px 20px 12px; margin-bottom: 40px; }
      .toc-label { margin-bottom: 8px; }
      .toc-h2-link { font-size: 16px; padding: 7px 4px 7px 21px; }
      .toc-h3-list a { font-size: 14px; }
      .toc-h3-list { padding-left: 36px; }
    }

    @media (max-width: 768px) { .doc-body p, .doc-body li { font-size: 18px; } }
    @media (max-width: 600px) { .container { padding: 0 20px; } }

  </style>
</head>
<body>

  <nav class="site-nav"></nav>

  <div class="page-hero">
    <div class="ember-field" aria-hidden="true"></div>
    <div class="container">
      <h1 class="page-title">Sapiens' Guide to<br><span class="title-accent">Revolution</span></h1>
    </div>
  </div>

  <main>
    <section class="guide-section">
      <div class="container">
        <div class="guide-layout">
          <aside class="guide-sidebar">
            <div id="toc-container"></div>
          </aside>
          <div class="guide-main">
            <div id="doc-content">
              <div class="loading-state">Loading guide...</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer"></footer>

  <script>
    const DOC_ID = SITE_CONFIG.GUIDE_DOC_ID;
    const EXPORT_URL = 'https://docs.google.com/document/d/' + DOC_ID + '/export?format=html';

    // Parse Google's exported CSS to map class names -> font properties
    function parseStyleBlock(css) {
      var map = {};
      var re = /\.([\w-]+)\s*\{([^}]*)\}/g;
      var m;
      while ((m = re.exec(css)) !== null) {
        var cls = m[1], body = m[2], props = {};
        var fs = body.match(/font-size:\s*([\d.]+)pt/);
        if (fs) props.size = parseFloat(fs[1]);
        var fw = body.match(/font-weight:\s*(\d+|bold)/);
        if (fw) props.weight = fw[1] === 'bold' ? 700 : parseInt(fw[1]);
        var fi = body.match(/font-style:\s*italic/);
        if (fi) props.italic = true;
        if (Object.keys(props).length) map[cls] = props;
      }
      return map;
    }

    function mergeStyles(classList, map) {
      var result = {};
      for (var i = 0; i < classList.length; i++) {
        var s = map[classList[i]];
        if (s) Object.assign(result, s);
      }
      return result;
    }

    // Strip Google's classes/styles; keep semantic elements (strong, em, a)
    function cleanNode(node) {
      if (node.nodeType !== Node.ELEMENT_NODE) return;
      var tag = node.tagName;
      // Keep formatting attributes on <a>; strip class/style/id everywhere
      node.removeAttribute('style');
      node.removeAttribute('class');
      node.removeAttribute('id');
      if (tag === 'A') {
        var href = node.getAttribute('href') || '';
        if (href && !href.startsWith('#')) {
          node.setAttribute('target', '_blank');
          node.setAttribute('rel', 'noopener');
        }
      }
      Array.from(node.childNodes).forEach(cleanNode);
    }

    function processDoc(html) {
      var parser = new DOMParser();
      var doc = parser.parseFromString(html, 'text/html');
      var body = doc.body;

      // Build class-to-font-properties map from the embedded <style>
      var styleEl = doc.querySelector('style');
      var classMap = parseStyleBlock(styleEl ? styleEl.textContent : '');

      // PASS 0 — fix Google's flat-sibling nested list structure BEFORE stripping classes.
      // Google exports nested bullets as sibling <ul> elements tagged lst-kix_ID-0, -1, -2…
      // We move each level-N list into the last <li> of the closest preceding level-(N-1) list.
      (function fixNestedLists() {
        var allLists = Array.from(body.querySelectorAll('ul, ol'));
        // Process in reverse so deeper levels are handled before their parents.
        for (var i = allLists.length - 1; i >= 0; i--) {
          var list = allLists[i];
          var m = (list.className || '').match(/lst-kix_(\w+)-(\d+)/);
          if (!m) continue;
          var listId = m[1], level = parseInt(m[2]);
          if (level === 0) continue;
          // Walk backwards through the captured array to find the parent list.
          for (var j = i - 1; j >= 0; j--) {
            var candidate = allLists[j];
            var cm = (candidate.className || '').match(/lst-kix_(\w+)-(\d+)/);
            if (cm && cm[1] === listId && parseInt(cm[2]) === level - 1) {
              var lastLi = candidate.lastElementChild;
              if (lastLi && lastLi.tagName === 'LI') lastLi.appendChild(list);
              break;
            }
          }
        }
      })();

      // PASS 1 — convert <p> to heading elements based on inner span font sizes/weights
      Array.from(body.querySelectorAll('p')).forEach(function(p) {
        var classes = Array.from(p.classList);

        // p.title = Google Docs "Title" paragraph style
        if (classes.indexOf('title') !== -1) {
          var h1 = doc.createElement('h1');
          h1.innerHTML = p.innerHTML;
          p.replaceWith(h1);
          return;
        }

        // Measure the dominant font properties across non-empty spans
        var maxSize = 0, allBold = true, hasSpans = false;
        Array.from(p.querySelectorAll('span')).forEach(function(span) {
          if (!span.textContent.trim()) return;
          hasSpans = true;
          var s = mergeStyles(Array.from(span.classList), classMap);
          if (s.size && s.size > maxSize) maxSize = s.size;
          if (!s.weight || s.weight < 600) allBold = false;
        });

        var tag = null;
        if (maxSize >= 20) tag = 'h2';
        else if (maxSize >= 13 && hasSpans && allBold) tag = 'h3';

        if (tag) {
          var heading = doc.createElement(tag);
          heading.innerHTML = p.innerHTML;
          p.replaceWith(heading);
        }
      });

      // PASS 2 — convert bold/italic spans inside body paragraphs and list items
      // (heading spans are left alone — the heading style already implies bold)
      Array.from(body.querySelectorAll('p span, li span')).forEach(function(span) {
        if (!span.textContent.trim()) return;
        var s = mergeStyles(Array.from(span.classList), classMap);
        var bold = s.weight >= 600;
        var italic = s.italic;
        if (!bold && !italic) return;

        var inner = span.innerHTML;
        if (italic) inner = '<em>' + inner + '</em>';
        if (bold)   inner = '<strong>' + inner + '</strong>';

        var tmp = doc.createElement('span');
        tmp.innerHTML = inner;
        span.replaceWith(...tmp.childNodes);
      });

      // Remove Google's style/script blocks
      body.querySelectorAll('style, script').forEach(function(el) { el.remove(); });

      // Strip all remaining class/style/id attributes
      cleanNode(body);

      // Collapse consecutive blank paragraphs into one
      var prevBlank = false;
      Array.from(body.querySelectorAll('p')).forEach(function(p) {
        var blank = !p.textContent.trim();
        if (blank && prevBlank) p.remove();
        prevBlank = blank;
      });

      return body.innerHTML;
    }

    function slugify(text) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function buildTOC() {
      var docBody = document.querySelector('.doc-body');
      var tocContainer = document.getElementById('toc-container');
      if (!docBody || !tocContainer) return;

      // Assign IDs to all headings
      var seen = {};
      Array.from(docBody.querySelectorAll('h1, h2, h3')).forEach(function(h, i) {
        var base = slugify(h.textContent.trim()) || ('s' + i);
        var id = seen[base] ? base + '-' + i : base;
        seen[base] = true;
        h.id = id;
      });

      // Build tree: h1 = section header, h2 = collapsible row, h3 = child
      var groups = [];
      var curGroup = null, curSection = null;
      Array.from(docBody.querySelectorAll('h1, h2, h3')).forEach(function(h) {
        var item = { text: h.textContent.trim(), id: h.id };
        if (h.tagName === 'H1') {
          curGroup = { header: item, sections: [] };
          curSection = null;
          groups.push(curGroup);
        } else if (h.tagName === 'H2') {
          if (!curGroup) { curGroup = { header: null, sections: [] }; groups.push(curGroup); }
          curSection = { heading: item, children: [] };
          curGroup.sections.push(curSection);
        } else if (h.tagName === 'H3' && curSection) {
          curSection.children.push(item);
        }
      });

      if (groups.length === 0) return;

      // Render as a single flat list — h1s are headers, h2s are collapsible rows (open by default)
      var html = '';
      groups.forEach(function(group, gi) {
        if (group.header) {
          html += '<div class="toc-group-header"><a href="#' + group.header.id + '">' + group.header.text + '</a></div>';
        }
        group.sections.forEach(function(sec, si) {
          var uid = 'toc-' + gi + '-' + si;
          var hasKids = sec.children.length > 0;
          html += '<div class="toc-h2-item"><div class="toc-h2-row">';
          if (hasKids) {
            html += '<button class="toc-chevron" aria-expanded="false" data-target="' + uid + '">›</button>';
          }
          html += '<a class="toc-h2-link" href="#' + sec.heading.id + '">' + sec.heading.text + '</a>';
          html += '</div>';
          if (hasKids) {
            html += '<ul class="toc-h3-list" id="' + uid + '">';
            sec.children.forEach(function(child) {
              html += '<li><a href="#' + child.id + '">' + child.text + '</a></li>';
            });
            html += '</ul>';
          }
          html += '</div>';
        });
      });

      tocContainer.innerHTML = '<nav class="toc"><span class="toc-label">Contents</span>' + html + '</nav>';

      // Chevron expand/collapse
      tocContainer.querySelectorAll('.toc-chevron').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var list = document.getElementById(btn.getAttribute('data-target'));
          if (!list) return;
          var open = list.classList.toggle('open');
          btn.classList.toggle('open', open);
          btn.setAttribute('aria-expanded', open);
        });
      });

      // Smooth scroll (offset for fixed nav)
      tocContainer.querySelectorAll('a[href^="#"]').forEach(function(a) {
        a.addEventListener('click', function(e) {
          e.preventDefault();
          var el = document.getElementById(a.getAttribute('href').slice(1));
          if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 100, behavior: 'smooth' });
        });
      });
    }

    function setupScrollSpy() {
      var tocContainer = document.getElementById('toc-container');
      if (!tocContainer) return;
      var headings = Array.from(document.querySelectorAll('.doc-body h1, .doc-body h2, .doc-body h3'));
      if (!headings.length) return;

      var lastId = null;
      var rafPending = false;

      function activate(id) {
        if (id === lastId) return;
        lastId = id;

        // Clear all active states
        tocContainer.querySelectorAll('.toc-active').forEach(function(el) { el.classList.remove('toc-active'); });

        // Find matching link
        var link = tocContainer.querySelector('a[href="#' + CSS.escape(id) + '"]');
        if (!link) return;
        link.classList.add('toc-active');

        // Auto-expand parent h3 list if needed
        var h3List = link.closest('.toc-h3-list');
        if (h3List && !h3List.classList.contains('open')) {
          h3List.classList.add('open');
          var chevron = tocContainer.querySelector('[data-target="' + h3List.id + '"]');
          if (chevron) { chevron.classList.add('open'); chevron.setAttribute('aria-expanded', 'true'); }
        }
      }

      function update() {
        var threshold = 110; // px below top of viewport to consider "current"
        var activeId = headings[0].id;
        for (var i = 0; i < headings.length; i++) {
          if (headings[i].getBoundingClientRect().top <= threshold) {
            activeId = headings[i].id;
          } else {
            break;
          }
        }
        activate(activeId);
        rafPending = false;
      }

      window.addEventListener('scroll', function() {
        if (!rafPending) { rafPending = true; requestAnimationFrame(update); }
      }, { passive: true });

      update(); // run once on load
    }

    async function loadGuide() {
      var container = document.getElementById('doc-content');
      try {
        var res = await fetch(EXPORT_URL);
        if (!res.ok) throw new Error(res.status);
        var html = await res.text();
        container.innerHTML = '<div class="doc-body">' + processDoc(html) + '</div>';
        buildTOC();
        setupScrollSpy();
      } catch (err) {
        console.error('Guide load error:', err);
        container.innerHTML = '<p class="error-state">Could not load the guide right now. <a href="https://docs.google.com/document/d/' + DOC_ID + '/edit" target="_blank" rel="noopener">Open in Google Docs</a></p>';
      }
    }

    loadGuide();

    initEmberField();
  </script>
  <script src="nav.js"></script>
  <script src="footer.js"></script>
  <script src="nav-circle.js"></script>
</body>
</html>
